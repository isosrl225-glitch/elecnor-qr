<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Ficha | ERP</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Segoe UI',system-ui,Arial,sans-serif;
  min-height:100vh;display:flex;align-items:flex-start;
  justify-content:center;padding:0;
}
body.modo-equipo{
  background:linear-gradient(160deg,#0f172a 0%,#1e3a8a 50%,#1d4ed8 100%);
}
body.modo-producto{
  background:linear-gradient(160deg,#0f172a 0%,#4c1d95 50%,#7c3aed 100%);
}
.card{
  background:#fff;border-radius:24px;overflow:hidden;
  box-shadow:0 32px 80px rgba(0,0,0,.6);
  width:100%;max-width:100%;margin:auto;
}
@media(min-width:520px){
  .card{max-width:420px;border-radius:24px}
  body{padding:20px 14px}
}
.hdr{
  padding:20px 22px 16px;position:relative;overflow:hidden;
}
.hdr.eq-hdr{
  background:linear-gradient(135deg,#0f172a 0%,#1e3a8a 55%,#1d4ed8 100%);
}
.hdr.pr-hdr{
  background:linear-gradient(135deg,#0f172a 0%,#4c1d95 55%,#7c3aed 100%);
}
.hdr::before{
  content:'';position:absolute;top:-40px;right:-40px;
  width:150px;height:150px;background:rgba(255,255,255,.05);border-radius:50%;
}
.badge{
  display:inline-flex;align-items:center;
  background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.22);
  border-radius:30px;padding:4px 13px;margin-bottom:10px;
}
.badge span{font-size:9px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase}
.badge.eq-badge span{color:#93c5fd}
.badge.pr-badge span{color:#c4b5fd}
.cod{color:#fff;font-size:22px;font-weight:800;display:flex;align-items:center;gap:9px;line-height:1.1}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.sub{font-size:11px;margin-top:5px;line-height:1.5}
.eq-sub{color:#bfdbfe}
.pr-sub{color:#ddd6fe}
.foto-wrap{
  background:#0f172a;min-height:240px;max-height:340px;
  display:flex;align-items:center;justify-content:center;overflow:hidden;
}
.foto-img{width:100%;max-height:340px;object-fit:cover;display:block}
.no-foto{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:8px;min-height:200px;width:100%;
}
.no-foto .icon{font-size:60px;opacity:.12}
.no-foto p{color:#4b5563;font-size:12px;font-style:italic}
.info{padding:16px 20px}
.row{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 0;border-bottom:1px solid #f1f5f9;
}
.row:last-child{border-bottom:none}
.lbl{font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.5px}
.val{font-size:12px;color:#0f172a;font-weight:600;text-align:right;max-width:60%}
.pill{padding:3px 11px;border-radius:20px;font-size:10px;font-weight:700}
.btn-print{
  display:block;margin:0 20px 16px;padding:11px;text-align:center;
  border:none;border-radius:12px;font-size:13px;font-weight:700;
  cursor:pointer;font-family:'Segoe UI',sans-serif;color:#fff;
}
.btn-print.eq-btn{background:linear-gradient(135deg,#1d4ed8,#3b82f6)}
.btn-print.pr-btn{background:linear-gradient(135deg,#7c3aed,#a78bfa)}
.foot{
  padding:10px 20px;display:flex;justify-content:space-between;align-items:center;
}
.foot.eq-foot{background:linear-gradient(135deg,#0f172a,#1e3a8a)}
.foot.pr-foot{background:linear-gradient(135deg,#0f172a,#4c1d95)}
.foot p{font-size:8px;letter-spacing:.6px;text-transform:uppercase;color:#475569}
.foot span{font-size:8px;font-weight:700}
.foot.eq-foot span{color:#93c5fd}
.foot.pr-foot span{color:#c4b5fd}
.tipo-badge{
  display:inline-block;padding:2px 8px;border-radius:8px;
  font-size:9px;font-weight:700;margin-bottom:6px;
}
.tipo-badge.eq-tipo{background:rgba(29,78,216,.15);color:#1d4ed8}
.tipo-badge.pr-tipo{background:rgba(124,58,237,.15);color:#7c3aed}
@media print{
  @page{size:A4 portrait;margin:15mm}
  body{padding:10mm}
  .btn-print{display:none!important}
  .card{box-shadow:0 4px 20px rgba(0,0,0,.2)!important}
}
</style>
</head>
<body>
<div class="card" id="card">
  <div id="content">⏳ Cargando...</div>
</div>
<script>
function esc(s){
  return String(s||'')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}
function toImg(url){
  if(!url) return '';
  var m = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if(m) return 'https://lh3.googleusercontent.com/d/'+m[1];
  return url;
}
function fmt(){
  return new Date().toLocaleDateString('es-PE',{day:'2-digit',month:'2-digit',year:'numeric'});
}

var p = new URLSearchParams(window.location.search);
var modo = (p.get('modo')||'equipo').toLowerCase();

// === EMPRESA DINÁMICA — lee de la URL, fallback a ELECNOR PERU S.A.C. ===
var empresa = (p.get('empresa') || 'ELECNOR PERU S.A.C.').toUpperCase();

/* ── MODO EQUIPO ─────────────────────────────────── */
if(modo === 'equipo' || modo === ''){
  var cod      = p.get('cod')      || '';
  var placa    = p.get('placa')    || '';
  var tipo     = p.get('tipo')     || '';
  var marca    = p.get('marca')    || '';
  var modelo   = p.get('modelo')   || '';
  var estado   = p.get('estado')   || '';
  var personal = p.get('personal') || '';
  var foto     = p.get('foto')     || '';
  var proyecto = p.get('proyecto') || '';

  if(!cod){
    document.getElementById('content').innerHTML='<div style="padding:40px;text-align:center;color:#94a3b8">⚠️ Código no encontrado</div>';
  } else {
    document.title = cod + ' | ' + empresa;
    document.body.classList.add('modo-equipo');
    var dotColor, pillBg, pillFg;
    switch(estado.toUpperCase().trim()){
      case 'OPERATIVO':
        dotColor='#22c55e'; pillBg='#dcfce7'; pillFg='#166534'; break;
      case 'EN MANTENIMIENTO':
        dotColor='#f59e0b'; pillBg='#fef3c7'; pillFg='#92400e'; break;
      case 'INOPERATIVO':
        dotColor='#ef4444'; pillBg='#fee2e2'; pillFg='#991b1b'; break;
      case 'BAJA':
        dotColor='#64748b'; pillBg='#e2e8f0'; pillFg='#334155'; break;
      case 'DESMOVILIZADO':
        dotColor='#a855f7'; pillBg='#f3e8ff'; pillFg='#6b21a8'; break;
      default:
        dotColor='#64748b'; pillBg='#e2e8f0'; pillFg='#334155';
    }
    var imgSrc   = toImg(foto);

    var fotoHTML = imgSrc
      ? '<div class="foto-wrap"><img class="foto-img" id="fi" src="'+esc(imgSrc)+'" alt="'+esc(cod)+'" onerror="document.getElementById(\'fi\').style.display=\'none\';document.getElementById(\'nf\').style.display=\'flex\'"/><div id="nf" class="no-foto" style="display:none"><span class="icon">📷</span><p>Sin foto registrada</p></div></div>'
      : '<div class="foto-wrap"><div class="no-foto"><span class="icon">📷</span><p>Sin foto registrada</p></div></div>';

    var perRow = personal
      ? '<div class="row"><span class="lbl">Personal</span><span class="val">'+esc(personal)+'</span></div>'
      : '';
    var proyRow = proyecto
      ? '<div class="row"><span class="lbl">Proyecto</span><span class="val">'+esc(proyecto)+'</span></div>'
      : '';

    document.getElementById('content').innerHTML =
      '<div class="hdr eq-hdr">'+
        '<div class="badge eq-badge"><span>⚡ '+esc(empresa)+'</span></div>'+
        '<div style="display:inline-block;margin-left:8px;" class="tipo-badge eq-tipo">EQUIPO</div><br>'+
        '<div class="cod"><span class="dot" style="background:'+dotColor+'"></span>'+esc(cod)+'</div>'+
        '<div class="sub eq-sub">🏷️ '+esc(placa)+' &nbsp;•&nbsp; '+esc(marca)+' '+esc(modelo)+'</div>'+
      '</div>'+
      fotoHTML+
      '<div class="info">'+
        '<div class="row"><span class="lbl">Código Interno</span><span class="val">'+esc(cod)+'</span></div>'+
        '<div class="row"><span class="lbl">Placa / Serie</span><span class="val">'+esc(placa)+'</span></div>'+
        '<div class="row"><span class="lbl">Tipo</span><span class="val">'+esc(tipo)+'</span></div>'+
        '<div class="row"><span class="lbl">Marca</span><span class="val">'+esc(marca)+'</span></div>'+
        '<div class="row"><span class="lbl">Modelo</span><span class="val">'+esc(modelo)+'</span></div>'+
        proyRow+
        perRow+
        '<div class="row"><span class="lbl">Estado</span><span class="val"><span class="pill" style="background:'+pillBg+';color:'+pillFg+'">'+esc(estado)+'</span></span></div>'+
      '</div>'+
      '<button class="btn-print eq-btn" onclick="window.print()">🖨️ Imprimir ficha</button>'+
      '<div class="foot eq-foot"><p>ERP • MAESTRO DE EQUIPOS</p><span>'+fmt()+'</span></div>';
  }

/* ── MODO PRODUCTO ───────────────────────────────── */
} else if(modo === 'producto'){
  var cod     = p.get('cod')     || '';
  var desc    = p.get('desc')    || '';
  var um      = p.get('um')      || '';
  var prov    = p.get('prov')    || '';
  var valS    = p.get('valS')    || '';
  var valD    = p.get('valD')    || '';
  var foto    = p.get('foto')    || '';
  var proyecto = p.get('proyecto') || '';

  if(!cod){
    document.getElementById('content').innerHTML='<div style="padding:40px;text-align:center;color:#94a3b8">⚠️ Código no encontrado</div>';
  } else {
    document.title = cod + ' | ' + empresa;
    document.body.classList.add('modo-producto');
    var imgSrc = toImg(foto);

    var fotoHTML = imgSrc
      ? '<div class="foto-wrap"><img class="foto-img" id="fp" src="'+esc(imgSrc)+'" alt="'+esc(cod)+'" onerror="document.getElementById(\'fp\').style.display=\'none\';document.getElementById(\'np\').style.display=\'flex\'"/><div id="np" class="no-foto" style="display:none"><span class="icon">📦</span><p>Sin foto registrada</p></div></div>'
      : '<div class="foto-wrap"><div class="no-foto"><span class="icon">📦</span><p>Sin foto registrada</p></div></div>';

    var provRow   = prov     ? '<div class="row"><span class="lbl">Proveedor</span><span class="val">'+esc(prov)+'</span></div>' : '';
    var valSRow   = valS     ? '<div class="row"><span class="lbl">Valor S/.</span><span class="val">S/. '+esc(valS)+'</span></div>' : '';
    var valDRow   = valD     ? '<div class="row"><span class="lbl">Valor USD</span><span class="val">$ '+esc(valD)+'</span></div>' : '';
    var proyRow   = proyecto ? '<div class="row"><span class="lbl">Proyecto</span><span class="val">'+esc(proyecto)+'</span></div>' : '';

    document.getElementById('content').innerHTML =
      '<div class="hdr pr-hdr">'+
        '<div class="badge pr-badge"><span>⚡ '+esc(empresa)+'</span></div>'+
        '<div style="display:inline-block;margin-left:8px;" class="tipo-badge pr-tipo">PRODUCTO</div><br>'+
        '<div class="cod">📦 '+esc(cod)+'</div>'+
        '<div class="sub pr-sub">'+esc(desc)+'</div>'+
      '</div>'+
      fotoHTML+
      '<div class="info">'+
        '<div class="row"><span class="lbl">Código</span><span class="val">'+esc(cod)+'</span></div>'+
        '<div class="row"><span class="lbl">Descripción</span><span class="val">'+esc(desc)+'</span></div>'+
        '<div class="row"><span class="lbl">Unidad de Medida</span><span class="val">'+esc(um)+'</span></div>'+
        provRow+
        proyRow+
        valSRow+
        valDRow+
      '</div>'+
      '<button class="btn-print pr-btn" onclick="window.print()">🖨️ Imprimir ficha</button>'+
      '<div class="foot pr-foot"><p>ERP • MAESTRO DE PRODUCTOS</p><span>'+fmt()+'</span></div>';
  }
}
</script>
</body>
</html>
